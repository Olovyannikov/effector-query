name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      # Opens/updates a "Version Packages" PR; on merge of that PR, publishes.
      # Requires repo Settings -> Actions -> General -> Workflow permissions ->
      #   "Allow GitHub Actions to create and approve pull requests" (enabled).
      # Publishing also needs the NPM_TOKEN secret.
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's registry-url writes .npmrc referencing ${NODE_AUTH_TOKEN};
          # without it the token is substituted empty and npm replies E404 on publish.
          # NPM_TOKEN is also kept for changesets/action's own auth handling.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
