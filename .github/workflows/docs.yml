name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys the production docs to the `gh-pages` branch (root). PR previews live
# under `pr-preview/` on the same branch, so `clean-exclude: pr-preview` keeps
# them intact and `force: false` avoids clobbering concurrent preview pushes.
# Repo setup: Settings → Pages → Source: "Deploy from a branch" → gh-pages /(root),
# and Settings → Actions → Workflow permissions: read and write.
permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:build
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/.vitepress/dist
          branch: gh-pages
          clean-exclude: pr-preview
          force: false
