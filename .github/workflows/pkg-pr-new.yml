name: Canary package

on:
  push:
    branches: [main]
  pull_request:

# Publishes a continuous-release canary of the package for every PR/commit via
# pkg.pr.new — installable as `npm i https://pkg.pr.new/Olovyannikov/effector-query@<sha>`.
# Requires the pkg.pr.new GitHub App to be installed on the repo (no secrets).
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm dlx pkg-pr-new publish --comment=update --packageManager=pnpm
