name: PR docs preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

# Production docs deploy via GitHub Actions owns the Pages site (one source only),
# so PR previews are uploaded as a downloadable artifact instead of a live URL.
# (For live per-PR URLs, deploy previews to an external host like Cloudflare
# Pages / Netlify — that needs an account + token.)
permissions:
  contents: read

concurrency: preview-${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:build
      - uses: actions/upload-artifact@v4
        with:
          name: docs-preview-pr-${{ github.event.number }}
          path: docs/.vitepress/dist
          retention-days: 7
