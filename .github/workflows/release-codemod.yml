name: Release codemod

# Publishes the standalone `effector-refetch-codemod` package (in codemod/) to npm.
# Manual trigger: bump codemod/package.json "version" first, then run this workflow.
# Uses the same NPM_TOKEN secret (classic Automation token recommended).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codemod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      # No build step (plain .mjs) and only `files` are packed, so a bare publish
      # is enough (publishConfig.access=public is set in codemod/package.json).
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
